<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evo Chains – Madfut Data</title>
<link rel="icon" type="image/x-icon" href="https://mf-data.b-cdn.net/web/Data Mini Logo (1).png">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="css/Card.css">
<link rel="stylesheet" href="css/Filter.css">
<style>
/* ── Chain card grid ─────────────────────────────────────── */
.chains-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 16px;
}

.chain-card {
  background: #fff;
  border: 1px solid var(--bg-grey, #e1e1e1);
  border-radius: 14px;
  overflow: hidden;
}

.chain-card-visual {
  background: #f8f8f8;
  height: 210px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 12px;
}

.chain-card-visual .card {
  transform: scale(0.65);
  transform-origin: top center;
  flex-shrink: 0;
  pointer-events: auto;
  position: relative;
  left: 50%;
  translate: -50%;
}

/* Info below visual */
.chain-info {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--bg-grey, #e1e1e1);
}
.chain-title {
  font-family: "Roboto", sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--dark, #262626);
  margin-bottom: 8px;
}
.chain-evo-list { display: flex; flex-direction: column; gap: 4px; }
.chain-evo-item {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px; color: var(--muted, #787878);
}
.chain-evo-num {
  width: 18px; height: 18px; border-radius: 50%;
  background: #22c55e; color: #fff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chain-stat-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.chain-pill {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
  font-family: 'Roboto Condensed', sans-serif;
}

/* ── Loading ─────────────────────────────────────────────── */
.chain-loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 300px; gap: 14px;
  color: var(--muted, #787878);
  font-family: 'Roboto Condensed', sans-serif; font-size: 15px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--bg-grey, #e1e1e1);
  border-top-color: var(--dark, #262626);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Pagination ──────────────────────────────────────────── */
.evo-pagination {
  display: flex; gap: 5px; flex-wrap: wrap;
  justify-content: center; margin-top: 24px; align-items: center;
}
.evo-pagination button { padding: 8px 12px; }
.evo-pagination input[type="number"] {
  width: 60px; text-align: center;
  border-radius: 4px; border: 1px solid rgba(0,0,0,0.15);
  background: #fff; color: var(--dark, #262626);
  padding: 8px; font-family: 'Roboto Condensed', sans-serif; font-size: 13px;
}
.evo-page-info {
  padding: 8px; font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px; color: var(--muted, #787878);
}

/* ── Chain-length buttons (injected into sidebar) ────────── */
.chain-len-btns {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 12px 16px;
}
.chain-len-btn {
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid #ccc; background: #fff;
  color: var(--muted, #787878);
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'Roboto Condensed', sans-serif; transition: all 0.15s;
}
.chain-len-btn:hover { border-color: var(--dark, #262626); color: var(--dark, #262626); }
.chain-len-btn.active { background: var(--dark, #262626); border-color: var(--dark, #262626); color: #fff; }

/* ── Evo name filter (injected into sidebar) ─────────────── */
.evo-name-filter-wrap {
  padding: 10px 16px 4px;
}
.evo-name-search {
  width: 100%;
  box-sizing: border-box;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.15);
  background: #fff;
  color: var(--dark, #262626);
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 12px;
  margin-bottom: 8px;
  outline: none;
}
.evo-name-search:focus { border-color: var(--dark, #262626); }
.evo-name-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 320px;
  overflow-y: auto;
  padding-bottom: 8px;
}
.evo-name-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 4px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 12px;
  color: var(--dark, #262626);
  user-select: none;
  transition: background 0.1s;
}
.evo-name-item:hover { background: rgba(0,0,0,0.04); }
.evo-name-item.deselected {
  opacity: 0.4;
}
.evo-name-check {
  width: 15px; height: 15px; border-radius: 3px;
  border: 1.5px solid #bbb;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
.evo-name-item:not(.deselected) .evo-name-check {
  background: var(--dark, #262626);
  border-color: var(--dark, #262626);
}
.evo-name-check svg { display: none; }
.evo-name-item:not(.deselected) .evo-name-check svg { display: block; }

.evo-name-controls {
  display: flex; gap: 6px; margin-bottom: 8px;
}
.evo-name-ctrl-btn {
  flex: 1;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #fff;
  color: var(--muted, #787878);
  font-size: 10px; font-weight: 700;
  cursor: pointer;
  font-family: 'Roboto Condensed', sans-serif;
  transition: all 0.12s;
}
.evo-name-ctrl-btn:hover { border-color: var(--dark,#262626); color: var(--dark,#262626); }

/* ── Mobile injected evo sections ────────────────────────── */
/* Sits inside #mobileFilterSheet, below #sheetBodyEl,
   above .sheet-footer. Matches Filter.js section styling. */
.evo-mobile-injected {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.evo-mobile-injected .evo-injected-wrap {
  display: block;
}

/* Mobile */
@media (max-width: 768px) {
  .chains-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
  .chain-card-visual { height: 155px; padding-top: 8px; }
  .chain-card-visual .card { transform: scale(0.48); left: 50%; translate: -50%; }
}
</style>
</head>
<body>

<nav class="breadcrumb-bar" aria-label="Breadcrumb">
  <div class="breadcrumb-scroll">
    <a href="/index.html">DATA</a>
    <span>›</span>
    <a href="/26/Database.html">DATABASE</a>
    <span>›</span>
    <a href="/26/Cards.html">CARDS</a>
    <span>›</span>
    <a href="#" class="bc-current">EVO CHAINS</a>
  </div>
</nav>

<main class="main-content" id="main-content">
  <h1 class="page-heading">EVO CHAINS</h1>
  <p class="page-desc">Every possible evolution chain across all cards in Madfut 26.</p>

  <div class="tmpl-strip-wrap">
    <div class="tmpl-strip" role="tablist">
      <a href="Cards.html"      class="tmpl-tab" role="tab">All Cards</a>
      <a href="Live-Cards.html" class="tmpl-tab" role="tab">Live Players</a>
      <a href="EvoChains.html"  class="tmpl-tab active" role="tab" aria-selected="true">Evo Chains</a>
      <a href="LTM-Cards.html"  class="tmpl-tab" role="tab">LTM Cards</a>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px">
    <div class="results-count" id="resultsCount"></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <button type="button" id="toggleFilterBtn" title="Show filters">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="chain-loading" class="chain-loading">
    <div class="spinner"></div>
    <span>Building evo chains…</span>
  </div>

  <div class="chains-grid" id="chains-grid" style="display:none"></div>

  <div class="evo-pagination" id="evoPagination" style="display:none">
    <button id="evoPageFirst">&lt;&lt;</button>
    <button id="evoPagePrev">&lt;</button>
    <input type="number" id="evoPageInput" min="1" value="1">
    <span class="evo-page-info" id="evoPageInfo">of 1</span>
    <button id="evoPageNext">&gt;</button>
    <button id="evoPageLast">&gt;&gt;</button>
  </div>
</main>

<!-- Exact same sidebar structure as Cards.html -->
<div class="filter-sidebar" id="filterSidebar">
  <div class="active-tags-bar" id="activeTagsBar">
    <span class="no-filters-hint">No filters active</span>
  </div>
  <div class="filter-page-nav" id="desktopPageNav"></div>
  <div class="filter-sidebar-body" id="sidebarBodyEl"></div>
</div>

<div id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="/Template26.js"></script>

<script type="module">
import { clubIdToName, leagueIdToName, nationIdToName } from '/26/js/Mappings.js';

// ── Filter.js inlined ──────────────────────────────────────────────────────

const PAGE_MODE    = 'evo';
const IS_LIVE_PAGE = false;

export const selectedClubs        = new Set();
export const selectedLeagues      = new Set();
export const selectedNations      = new Set();
export const selectedColors       = new Set();
export const selectedPositions    = new Set();
export const selectedAltPositions = new Set();
export let   positionMode         = 'both';

const ALL_DB_SOURCES = ['updates','sbcGroups','objectives','evosElite','draftCups','livePlayers','realmExport'];
export const selectedDbs = new Set(ALL_DB_SOURCES);

const STAT_KEYS = ['PAC','SHO','PAS','DRI','DEF','PHY','DIV','HAN','KIC','REF','SPD','POS','attack','control','defense'];
export let statFiltersState = {};
STAT_KEYS.forEach(k => { statFiltersState[k] = []; });

export let uniqueColors = [];
export function setUniqueColors(colors) { uniqueColors = colors; }

const POSITION_GROUPS = {
  attack: ['LW', 'ST', 'RW'],
  mid:    ['LM', 'CAM', 'RM', 'CM', 'CDM'],
  defend: ['LB', 'CB', 'RB', 'GK'],
};

const POSITION_ROWS = [
  { positions: ['LW', 'ST', 'RW'] },
  { positions: ['LM', 'CAM', 'RM'] },
  { positions: ['CM', 'CB', 'CDM'] },
  { positions: ['LB', 'GK', 'RB'] },
];

const SORT_FIELDS = ['Rating','Date','Added At', 'Attack','Control','Defense','Net Fatal','Total Fatal','PAC','SHO','PAS','DRI','DEF','PHY','DIV','HAN','KIC','REF','SPD','POS','Name','Position'];
export let sortRules = [{ field: 'date', dir: 'desc' }];

export const displayState = {
  showDownload: true, showFCM: false, showFatal: true,
  showAltPos: true, showBreakdown: false, viewMode: 'view',
};
export const downloadState = {
  showFCM: false, showFatal: true, showAltPos: true, showBreakdown: false,
};
export const miscState = {
  inPacks: false, objReward: false, sbcReward: false, cupReward: false,
  evoReward: false, inTokens: false, inPicks: false, tradable: false,
  untradeable: false, totw: false, totwWeek: '', genderMen: false,
  genderWomen: false, dynamicImage: false,
};

function triggerFilter()  { if (typeof window._filterAndSort === 'function') window._filterAndSort(); }
function showToast(msg)   { if (typeof window._cardShowToast === 'function') window._cardShowToast(msg); }

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function normalise(str) {
  return (str||'')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/ø/gi, 'o')
    .replace(/æ/gi, 'ae')
    .replace(/å/gi, 'a')
    .replace(/ð/gi, 'd', 'o')
    .replace(/þ/gi, 'th', 'b', 'p')
    .replace(/ß/gi, 'ss', 'b')
    .toLowerCase();
}

if (!window.ratingState) window.ratingState = { min: 0, max: 99 };
if (!window.fcmState)    window.fcmState    = { min: 0, max: 150 };

let showStatSliders = false;
let badgeTab    = 'clubs';
let badgeSearch = '';
let sidebarBody = null;
let sheetBody   = null;
let mobileSearch = null;
let mobileSheet  = null;

// ── Evo-specific state ────────────────────────────────────────────────────
window._deselectedEvos = new Set();
window._mustIncludeEvo = null;
let _evoNames = [];

// ── Page builders ─────────────────────────────────────────────────────────
const BADGE_TAB_LABELS = { clubs:'Club', leagues:'League', nations:'Nation', design:'Card Type' };

function buildPage(page) {
  switch (page) {
    case 'search':    return buildSearchPage();
    case 'sort':      return buildSortPage();
    case 'badges':    return buildBadgesPage();
    case 'positions': return buildPositionsPage();
    case 'stats':     return buildStatsPage();
    case 'display':   return buildDisplayPage();
    case 'misc':      return buildMiscPage();
    case 'evos':      return buildEvosPage();
    default:          return '';
  }
}

function buildSearchPage() {
  const searchVal = window._currentSearch || '';
  return `
  <div class="page-pad">
    <div class="fs-search-wrap" style="margin-bottom:6px">
      <input class="fs-search-input" type="text" id="desktopSearchInput"
        placeholder="Search player name…" value="${escHtml(searchVal)}" autocomplete="off">
      <button class="fs-search-clear" id="desktopSearchClear">×</button>
    </div>
    <div class="fs-section-title" style="margin-bottom:8px">Database Source</div>
    <div class="db-filter-group">
      ${dbSources().map(s => `
      <label class="fs-check-row" style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer">
        <input type="checkbox" class="db-filter" value="${s.value}" ${selectedDbs.has(s.value) ? 'checked' : ''}>
        <div class="fs-check-label">${s.label}</div>
      </label>`).join('')}
    </div>
  </div>`;
}

function dbSources() {
  return [
    { value:'updates',     label:'Updates'            },
    { value:'sbcGroups',   label:'SBC Groups'         },
    { value:'objectives',  label:'Objectives'         },
    { value:'evosElite',   label:'Elite Evos'         },
    { value:'draftCups',   label:'Draft Cups'         },
    { value:'livePlayers', label:'Live Players'       },
    { value:'realmExport', label:'Base Cards (Realm)' },
  ];
}

function buildSortPage() {
  return `
  <div class="sort-page-wrap">
    ${sortRules.map((r,i) => `
    <div class="sort-rule-card">
      <div class="sort-rule-top">
        <span class="sort-rule-label">Rule ${i+1}</span>
        ${i > 0 ? `<button class="sort-rule-remove" data-remove="${i}">×</button>` : ''}
      </div>
      <select class="sort-field-select" data-sort-field="${i}">
        ${SORT_FIELDS.map(f => `<option value="${f.toLowerCase().replace(/ /g,'_')}" ${r.field===f.toLowerCase().replace(/ /g,'_')?'selected':''}>${f}</option>`).join('')}
      </select>
      <div class="sort-dir-btns">
        <button class="sort-dir-btn ${r.dir==='asc'?'active':''}" data-sort-dir="${i}" data-val="asc">↑ Asc</button>
        <button class="sort-dir-btn ${r.dir==='desc'?'active':''}" data-sort-dir="${i}" data-val="desc">↓ Desc</button>
      </div>
    </div>`).join('')}
    ${sortRules.length < 5 ? `<button class="sort-add-btn" id="sortAddBtn">+ Add sort rule</button>` : ''}
  </div>`;
}

function buildBadgesPage() {
  const tabs = ['clubs','leagues','nations'];
  const selSet = getBadgeSel();
  const selectedItems = [...selSet].map(id => {
    const name = _badgeName(id);
    const img  = getBadgeImg(id);
    const imgEl = img ? `<img src="${img}" onerror="this.style.display='none'" alt="" style="width:16px;height:16px;object-fit:contain;border-radius:2px;flex-shrink:0">` : '';
    return `<div class="badge-chip" data-badge-remove="${id}">${imgEl}<span>${escHtml(name)}</span><button>×</button></div>`;
  }).join('');
  const term  = badgeSearch.toLowerCase();
  const items = term ? getBadgeData().filter(([,n]) => n.toLowerCase().includes(term)) : [];
  const dropdownHtml = term ? `
    <div class="badge-dropdown" id="badgeDropdown">
      ${items.length ? items.map(([id,name]) => {
        const sel = selSet.has(id);
        const img = getBadgeImg(id);
        const imgEl = img ? `<img src="${img}" onerror="this.style.display='none'" alt="">` : `<div class="badge-fallback">${name.substring(0,2).toUpperCase()}</div>`;
        return `<div class="fs-select-item ${sel?'selected':''}" data-badge-id="${id}" data-badge-name="${escHtml(name)}">${imgEl}<span>${escHtml(name)}</span>${sel?'<div class="fs-select-dot"></div>':''}</div>`;
      }).join('') : `<div class="badge-no-results">No results</div>`}
    </div>` : '';
  return `
  <div class="page-pad">
    <div class="badge-tabs">
      ${tabs.map(t => `<button class="badge-tab-btn ${badgeTab===t?'active':''}" data-badge-tab="${t}">${BADGE_TAB_LABELS[t]}</button>`).join('')}
    </div>
    ${selectedItems ? `<div class="badge-chips-row" id="badgeChipsRow">${selectedItems}</div>` : ''}
    <div class="fs-search-wrap badge-search-wrap" style="margin-bottom:0">
      <input class="fs-search-input" id="badgeSearchInput" type="text"
        placeholder="Search ${BADGE_TAB_LABELS[badgeTab]}…" value="${escHtml(badgeSearch)}" autocomplete="off">
      <button class="fs-search-clear" id="badgeSearchClear">×</button>
    </div>
    ${dropdownHtml}
  </div>`;
}

function _badgeName(id) {
  if (badgeTab==='clubs')   return clubIdToName[id]   || id;
  if (badgeTab==='leagues') return leagueIdToName[id] || id;
  if (badgeTab==='nations') return nationIdToName[id] || id;
  return window.colorMap?.[id]?.name || id;
}
function getBadgeData() {
  if (badgeTab==='clubs')   return Object.entries(clubIdToName).sort((a,b)=>a[1].localeCompare(b[1]));
  if (badgeTab==='leagues') return Object.entries(leagueIdToName).sort((a,b)=>a[1].localeCompare(b[1]));
  if (badgeTab==='nations') return Object.entries(nationIdToName).sort((a,b)=>a[1].localeCompare(b[1]));
  const cm = window.colorMap || {};
  return Object.entries(cm).map(([id,d])=>[id,d.name||id]).sort((a,b)=>a[1].localeCompare(b[1]));
}
function getBadgeSel() {
  if (badgeTab==='clubs')   return selectedClubs;
  if (badgeTab==='leagues') return selectedLeagues;
  if (badgeTab==='nations') return selectedNations;
  return selectedColors;
}
function getBadgeImg(id) {
  if (badgeTab==='clubs')   return `https://mf-data.b-cdn.net/26/Badges/Clubs/Small/club_small_${id}.png`;
  if (badgeTab==='leagues') return `https://mf-data.b-cdn.net/26/Badges/Leagues/Small/league_small_${id}.png`;
  if (badgeTab==='nations') return `https://mf-data.b-cdn.net/26/Badges/Nations/Small/nation_small_${id}.png`;
  const cm = window.colorMap || {};
  return cm[id]?.url_small || cm[id]?.url_micro || '';
}

function buildPositionsPage() {
  const rows = POSITION_ROWS.map(row => {
    const btns = row.positions.map(pos => {
      const isMain = selectedPositions.has(pos);
      const isAlt  = selectedAltPositions.has(pos);
      let cls = 'pos-rect-btn';
      if (isMain && isAlt) cls += ' sel-both';
      else if (isMain)     cls += ' sel-main';
      else if (isAlt)      cls += ' sel-alt';
      return `<button class="${cls}" data-pos="${pos}">${pos}</button>`;
    }).join('');
    return `<div class="pos-row">${btns}</div>`;
  }).join('');
  return `
  <div class="page-pad">
    <div class="pitch-mode-row">
      ${['both','main','alt'].map(m=>`<button class="pitch-mode-btn ${positionMode===m?'active':''}" data-pos-mode="${m}">${m==='both'?'Both':m==='main'?'Main':'Alt'}</button>`).join('')}
    </div>
    <div class="pos-group-header-row">
      <button class="pos-group-btn" data-pos-group="attack">Attackers</button>
      <button class="pos-group-btn" data-pos-group="mid">Midfielders</button>
      <button class="pos-group-btn" data-pos-group="defend">Defenders</button>
    </div>
    <div class="pos-grid-wrap">${rows}</div>
  </div>`;
}

const STAT_DEFS = [
  { key:'PAC', label:'Pace',      max:99, group:'outfield' },
  { key:'SHO', label:'Shooting',  max:99, group:'outfield' },
  { key:'PAS', label:'Passing',   max:99, group:'outfield' },
  { key:'DRI', label:'Dribbling', max:99, group:'outfield' },
  { key:'DEF', label:'Defending', max:99, group:'outfield' },
  { key:'PHY', label:'Physical',  max:99, group:'outfield' },
  { key:'DIV', label:'Diving',    max:99, group:'gk' },
  { key:'HAN', label:'Handling',  max:99, group:'gk' },
  { key:'KIC', label:'Kicking',   max:99, group:'gk' },
  { key:'REF', label:'Reflexes',  max:99, group:'gk' },
  { key:'SPD', label:'Speed',     max:99, group:'gk' },
  { key:'POS', label:'Positioning', max:99, group:'gk' },
  { key:'attack',  label:'Attack',   max:99,  group:'fatal' },
  { key:'control', label:'Control',  max:99,  group:'fatal' },
  { key:'defense', label:'Defense',  max:99,  group:'fatal' },
];
const RATING_DEF = { key:'rating', label:'Rating', max:99, group:'card' };

function buildStatsPage() {
  const allDefs     = [RATING_DEF, ...STAT_DEFS];
  const outfieldDefs = allDefs.filter(d => d.group==='outfield' || d.key==='rating');
  const gkDefs      = allDefs.filter(d => d.group==='gk');
  const fatalDefs   = allDefs.filter(d => d.group==='fatal');
  return `
  <div class="page-pad">

function getStatState(key) {
  if (key==='rating') return [window.ratingState.min, window.ratingState.max];
  if (key==='fcm')    return [window.fcmState.min,    window.fcmState.max];
  const rules = statFiltersState[key] || [];
  return [rules.find(r=>r.op==='>=')?.val??0, rules.find(r=>r.op==='<=')?.val??99];
}

function buildStatNumOnly({ key, label, max }) {
  const [lo, hi] = getStatState(key);

}

function buildStatSlider({ key, label, max }) {

// ── Bind events ───────────────────────────────────────────────────────────
function bindPageEvents(container, page) {
  if (!container) return;

  if (page === 'search') {
    const inp = container.querySelector('#desktopSearchInput');
    const clr = container.querySelector('#desktopSearchClear');
    inp?.addEventListener('input', e => {
      window._currentSearch = e.target.value;
      if (mobileSearch) mobileSearch.value = e.target.value;
      triggerFilter(); updateActiveFilters();
    });
    clr?.addEventListener('click', () => {
      if (inp) inp.value = '';
      window._currentSearch = '';
      if (mobileSearch) mobileSearch.value = '';
      triggerFilter(); updateActiveFilters();
    });
    container.querySelectorAll('.db-filter').forEach(cb => {
      cb.addEventListener('change', e => {
        if (e.target.checked) selectedDbs.add(e.target.value);
        else selectedDbs.delete(e.target.value);
        triggerFilter(); updateActiveFilters();
      });
    });
  }

  if (page === 'sort') {
    container.querySelectorAll('[data-sort-field]').forEach(sel => {
      sel.addEventListener('change', e => { sortRules[parseInt(e.target.dataset.sortField)].field = e.target.value; triggerFilter(); });
    });
    container.querySelectorAll('[data-sort-dir]').forEach(btn => {
      btn.addEventListener('click', e => {
        const i = parseInt(e.currentTarget.dataset.sortDir);
        sortRules[i].dir = e.currentTarget.dataset.val;
        container.querySelectorAll(`[data-sort-dir="${i}"]`).forEach(b => b.classList.toggle('active', b.dataset.val===sortRules[i].dir));
        triggerFilter();
      });
    });
    container.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', e => { sortRules.splice(parseInt(e.currentTarget.dataset.remove),1); renderPageInto(container,'sort'); triggerFilter(); });
    });
    container.querySelector('#sortAddBtn')?.addEventListener('click', () => { sortRules.push({field:'rating',dir:'desc'}); renderPageInto(container,'sort'); });
  }

  if (page === 'badges') {
    container.querySelectorAll('[data-badge-tab]').forEach(btn => {
      btn.addEventListener('click', e => { badgeTab=e.currentTarget.dataset.badgeTab; badgeSearch=''; renderPageInto(container,'badges'); });
    });
    const bInp = container.querySelector('#badgeSearchInput');
    const bClr = container.querySelector('#badgeSearchClear');
    if (bInp) {
      bInp.addEventListener('input', e => {
        badgeSearch = e.target.value;
        const existing = container.querySelector('#badgeDropdown');
        const wrap     = container.querySelector('.badge-search-wrap');
        if (existing) existing.remove();
        const term = badgeSearch.toLowerCase();
        const selSet = getBadgeSel();
        const items  = term ? getBadgeData().filter(([,n])=>n.toLowerCase().includes(term)) : [];
        if (term) {
          const dropdown = document.createElement('div');
          dropdown.className = 'badge-dropdown'; dropdown.id = 'badgeDropdown';
          dropdown.innerHTML = items.length ? items.map(([id,name])=>{
            const sel=selSet.has(id), img=getBadgeImg(id);
            const imgEl=img?`<img src="${img}" onerror="this.style.display='none'" alt="">` : `<div class="badge-fallback">${name.substring(0,2).toUpperCase()}</div>`;
            return `<div class="fs-select-item ${sel?'selected':''}" data-badge-id="${id}" data-badge-name="${escHtml(name)}">${imgEl}<span>${escHtml(name)}</span>${sel?'<div class="fs-select-dot"></div>':''}</div>`;
          }).join('') : `<div class="badge-no-results">No results</div>`;
          wrap?.insertAdjacentElement('afterend', dropdown);
          bindBadgeItems(container);
        }
      });
    }
    bClr?.addEventListener('click', () => { badgeSearch=''; if(bInp) bInp.value=''; renderPageInto(container,'badges'); });
    container.querySelectorAll('[data-badge-remove]').forEach(chip => {
      chip.addEventListener('click', e => { getBadgeSel().delete(e.currentTarget.dataset.badgeRemove); renderPageInto(container,'badges'); triggerFilter(); updateActiveFilters(); });
    });
    bindBadgeItems(container);
  }

  if (page === 'positions') {
    container.querySelectorAll('[data-pos-mode]').forEach(btn => {
      btn.addEventListener('click', e => { positionMode=e.currentTarget.dataset.posMode; _refreshAllSections(); });
    });
    container.querySelectorAll('.pos-rect-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const pos = e.currentTarget.dataset.pos;
        if (positionMode==='main') {
          if (selectedPositions.has(pos)) {
            selectedPositions.delete(pos);
          } else {
            selectedPositions.add(pos);
            // If it was alt-only, clicking main should make it main-only, not both
            // so we remove from alt
            selectedAltPositions.delete(pos);
          }
        } else if (positionMode==='alt') {
          if (selectedAltPositions.has(pos)) {
            selectedAltPositions.delete(pos);
          } else {
            selectedAltPositions.add(pos);
            // Same logic: clicking alt removes from main
            selectedPositions.delete(pos);
          }
        } else {
          // Both mode: toggle both sets together
          if (selectedPositions.has(pos) || selectedAltPositions.has(pos)) {
            selectedPositions.delete(pos);
            selectedAltPositions.delete(pos);
          } else {
            selectedPositions.add(pos);
            selectedAltPositions.add(pos);
          }
        }
        _refreshAllSections(); triggerFilter(); updateActiveFilters();
      });
    });
    container.querySelectorAll('[data-pos-group]').forEach(btn => {
      btn.addEventListener('click', e => {
        const group = e.currentTarget.dataset.posGroup;
        const positions = POSITION_GROUPS[group];
        const allMain = positions.every(p=>selectedPositions.has(p));
        const allAlt  = positions.every(p=>selectedAltPositions.has(p));
        if (positionMode==='main') { if(allMain) positions.forEach(p=>selectedPositions.delete(p)); else positions.forEach(p=>selectedPositions.add(p)); }
        else if (positionMode==='alt') { if(allAlt) positions.forEach(p=>selectedAltPositions.delete(p)); else positions.forEach(p=>selectedAltPositions.add(p)); }
        else { if(allMain) positions.forEach(p=>selectedPositions.delete(p)); else positions.forEach(p=>selectedPositions.add(p)); }
        _refreshAllSections(); triggerFilter(); updateActiveFilters();
      });
    });
  }

  if (page === 'stats') {
    container.querySelector('#statSliderToggleBtn')?.addEventListener('click', () => { showStatSliders=!showStatSliders; _refreshAllSections(); });
    container.querySelectorAll('[data-stat-lo]').forEach(inp => inp.addEventListener('input', e => applyStatLo(e.target.dataset.statLo, e.target.value, parseInt(e.target.dataset.max))));
    container.querySelectorAll('[data-stat-hi]').forEach(inp => inp.addEventListener('input', e => applyStatHi(e.target.dataset.statHi, e.target.value, parseInt(e.target.dataset.max))));
    container.querySelectorAll('[data-num-lo]').forEach(inp => inp.addEventListener('change', e => applyStatLo(e.target.dataset.numLo, e.target.value, parseInt(e.target.dataset.max))));
    container.querySelectorAll('[data-num-hi]').forEach(inp => inp.addEventListener('change', e => applyStatHi(e.target.dataset.numHi, e.target.value, parseInt(e.target.dataset.max))));
  }

  if (page === 'display') {
    container.querySelectorAll('[data-display]').forEach(inp => inp.addEventListener('change', e => { displayState[e.target.dataset.display]=e.target.checked; applyDisplayState(); }));
  }

  if (page === 'misc') {
    container.querySelectorAll('[data-misc]').forEach(inp => {
      inp.addEventListener('change', e => {
        miscState[e.target.dataset.misc]=e.target.checked;
        if (e.target.dataset.misc==='totw') _refreshAllSections();
        triggerFilter(); updateActiveFilters();
      });
    });
    container.querySelector('#totwWeekInput')?.addEventListener('input', e => { miscState.totwWeek=e.target.value; triggerFilter(); updateActiveFilters(); });
  }

  if (page === 'evos') {
    // Chain length
    container.querySelectorAll('.chain-len-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        chainLenFilter = btn.dataset.len;
        document.querySelectorAll('.chain-len-btn').forEach(b => b.classList.toggle('active', b.dataset.len===chainLenFilter));
        triggerFilter();
      });
    });
    // Must include
    container.querySelector('#mustIncludeList')?.addEventListener('click', e => {
      const item = e.target.closest('[data-must-evo]');
      if (!item) return;
      window._mustIncludeEvo = item.dataset.mustEvo==='__none__' ? null : item.dataset.mustEvo;
      _refreshAllSections(); triggerFilter();
    });
    container.querySelector('#mustIncludeSearch')?.addEventListener('input', e => {
      const q = normalise(e.target.value);
      container.querySelectorAll('[data-must-evo]').forEach(el => {
        if (el.dataset.mustEvo==='__none__') return;
        el.style.display = (!q || normalise(el.dataset.mustEvo).includes(q)) ? '' : 'none';
      });
    });
    // Evo list toggles
    container.querySelector('.evo-name-list:last-of-type')?.addEventListener('click', e => {
      const item = e.target.closest('.evo-name-item[data-evo]');
      if (!item) return;
      const name = item.dataset.evo;
      if (window._deselectedEvos.has(name)) window._deselectedEvos.delete(name);
      else window._deselectedEvos.add(name);
      _refreshAllSections(); triggerFilter();
    });
    container.querySelector('[data-evo-ctrl="all"]')?.addEventListener('click', () => { window._deselectedEvos.clear(); _refreshAllSections(); triggerFilter(); });
    container.querySelector('[data-evo-ctrl="none"]')?.addEventListener('click', () => { _evoNames.forEach(n=>window._deselectedEvos.add(n)); _refreshAllSections(); triggerFilter(); });
    container.querySelector('.evo-list-search')?.addEventListener('input', e => {
      const q = normalise(e.target.value);
      container.querySelectorAll('[data-evo]').forEach(el => {
        el.style.display = (!q || normalise(el.dataset.evo).includes(q)) ? '' : 'none';
      });
    });
  }
}

function bindBadgeItems(container) {
  container.querySelectorAll('[data-badge-id]').forEach(item => {
    item.addEventListener('click', e => {
      const id=e.currentTarget.dataset.badgeId, name=e.currentTarget.dataset.badgeName;
      const sel=getBadgeSel();
      if(sel.has(id)) sel.delete(id); else { sel.add(id); showToast(`${name} added`); }
      renderPageInto(container,'badges'); triggerFilter(); updateActiveFilters();
    });

}

// ── Stat helpers ──────────────────────────────────────────────────────────
function applyStatLo(key, rawVal, max) {
  const hi = getStatState(key)[1];
  const val = Math.max(0, Math.min(parseInt(rawVal)||0, hi));
  if (key==='rating') window.ratingState.min=val;
  else if (key==='fcm') window.fcmState.min=val;
  else { if(!statFiltersState[key]) statFiltersState[key]=[]; const arr=statFiltersState[key]; const idx=arr.findIndex(r=>r.op==='>='); if(idx>=0) arr[idx].val=val; else arr.push({op:'>=',val}); }
  triggerFilter(); updateActiveFilters();
}
function applyStatHi(key, rawVal, max) {
  const lo = getStatState(key)[0];
  const val = Math.max(lo, Math.min(parseInt(rawVal)||max, max));
  if (key==='rating') window.ratingState.max=val;
  else if (key==='fcm') window.fcmState.max=val;
  else { if(!statFiltersState[key]) statFiltersState[key]=[]; const arr=statFiltersState[key]; const idx=arr.findIndex(r=>r.op==='<='); if(idx>=0) arr[idx].val=val; else arr.push({op:'<=',val}); }
  triggerFilter(); updateActiveFilters();
}

// ── Active tags ───────────────────────────────────────────────────────────
function updateActiveFilters() {
  const bar       = document.getElementById('activeTagsBar');
  const mobileBar = document.getElementById('mobileActiveTagsBar');
  if (!bar && !mobileBar) return;
  const tags = [];
  selectedClubs.forEach(id   => tags.push({ text:`Club: ${clubIdToName[id]||id}`,     remove:()=>{ selectedClubs.delete(id);   triggerFilterAndRefresh(); } }));
  selectedLeagues.forEach(id => tags.push({ text:`League: ${leagueIdToName[id]||id}`, remove:()=>{ selectedLeagues.delete(id); triggerFilterAndRefresh(); } }));
  selectedNations.forEach(id => tags.push({ text:`Nation: ${nationIdToName[id]||id}`, remove:()=>{ selectedNations.delete(id); triggerFilterAndRefresh(); } }));
  selectedColors.forEach(c   => { if(c.toLowerCase()==='default') return; tags.push({ text:`Type: ${window.colorMap?.[c]?.name||c}`, remove:()=>{ selectedColors.delete(c); triggerFilterAndRefresh(); } }); });
  selectedPositions.forEach(p => tags.push({ text:`Pos: ${p}`, remove:()=>{ selectedPositions.delete(p); triggerFilterAndRefresh(); } }));
  const rMin=window.ratingState?.min??0, rMax=window.ratingState?.max??99;
  if (rMin>0||rMax<99) tags.push({ text:`Rating: ${rMin}–${rMax}`, remove:()=>{ window.ratingState={min:0,max:99}; triggerFilterAndRefresh(); } });
  STAT_KEYS.forEach(stat => {
    const rules=statFiltersState[stat]||[];
    const lo=rules.find(r=>r.op==='>='), hi=rules.find(r=>r.op==='<=');
    if((lo&&lo.val>0)||(hi&&hi.val<99)) tags.push({ text:`${stat.toUpperCase()}: ${lo?.val??0}–${hi?.val??99}`, remove:()=>{ statFiltersState[stat]=[]; triggerFilterAndRefresh(); } });
  });
  if (window._mustIncludeEvo) tags.push({ text:`Must: ${window._mustIncludeEvo}`, remove:()=>{ window._mustIncludeEvo=null; triggerFilterAndRefresh(); } });
  if (chainLenFilter!=='all') tags.push({ text:`Chain: ${chainLenFilter==='4'?'4+':chainLenFilter} Evo${chainLenFilter==='1'?'':'s'}`, remove:()=>{ chainLenFilter='all'; triggerFilterAndRefresh(); } });

  const tagHTML = tags.map((t,i)=>`<div class="a-tag" data-tag="${i}">${escHtml(t.text)}<button data-tag-remove="${i}">×</button></div>`).join('')
    + `<button class="clear-all-tags" id="clearAllTagsBtn">Clear all</button>`;
  const emptyHTML = '<span class="no-filters-hint">No filters active</span>';
  [bar, mobileBar].forEach(b => {
    if (!b) return;
    b.innerHTML = tags.length===0 ? emptyHTML : tagHTML;
    b.querySelectorAll('[data-tag-remove]').forEach(btn => { const i=parseInt(btn.dataset.tagRemove); btn.addEventListener('click',()=>tags[i].remove()); });
    b.querySelector('#clearAllTagsBtn')?.addEventListener('click', clearAllFilters);
  });
  const badge = document.getElementById('mobileFabBadge');
  if (badge) { badge.style.display=tags.length>0?'block':'none'; badge.textContent=tags.length; }
}

function triggerFilterAndRefresh() {
  triggerFilter(); updateActiveFilters(); _refreshAllSections();
}

// ── Clear all ─────────────────────────────────────────────────────────────
function clearAllFilters() {
  selectedDbs.clear(); ALL_DB_SOURCES.forEach(s=>selectedDbs.add(s));
  selectedClubs.clear(); selectedLeagues.clear(); selectedNations.clear();

function meetsRequirement(req, card) {
  const [type, val] = req.split(',');
  const rangeCheck = (v, range) => {
    const [lo, hi] = range.split('-').map(Number);
    return parseInt(v) >= lo && parseInt(v) <= hi;
  };
  const isGK = (card.position||'').toUpperCase() === 'GK';
  switch (type) {
    case 'nation':   return String(card.nationId) === val;
    case 'league':   return String(card.leagueId) === val;
    case 'club':     return String(card.clubId)   === val;
    case 'color': {
      const c = (card.color||'').toLowerCase(), r = val.toLowerCase();
      const a = {
        all_silver:['silver','rare_silver'],
        all_gold:['gold','rare_gold'],
        all_bronze:['bronze','rare_bronze'],
      };
      if (r === 'all_special') {
        const base = ['gold','rare_gold','silver','rare_silver','bronze','rare_bronze'];
        return !base.includes(c);
      }
      return a[r] ? a[r].includes(c) : c === r;
    }
    case 'position': return (card.position||'').toUpperCase() === val.toUpperCase();
    case 'rating':  return rangeCheck(card.rating,  val);
    case 'attack':  return rangeCheck(card.attack,  val);
    case 'control': return rangeCheck(card.control, val);
    case 'defense': return rangeCheck(card.defense, val);
    // For outfield stat requirements, GKs are excluded entirely
    // since PAC/SHO/PAS/DRI/DEF/PHY requirements are meaningless for GK cards
    case 'PAC': return isGK ? false : rangeCheck(card.PAC, val);
    case 'SHO': return isGK ? false : rangeCheck(card.SHO, val);
    case 'PAS': return isGK ? false : rangeCheck(card.PAS, val);
    case 'DRI': return isGK ? false : rangeCheck(card.DRI, val);
    case 'DEF': return isGK ? false : rangeCheck(card.DEF, val);
    case 'PHY': return isGK ? false : rangeCheck(card.PHY, val);
    default: return true;
  }
}

function parseUpgrade(s) {
  const p = s.split(',').map(Number);
  return { overall:p[0]||0, attack:p[1]||0, control:p[2]||0, defense:p[3]||0 };
}

function applyEvoToCard(card, evo) {
  let c = { ...card };
  const cap = v => Math.min(99, v);
  const isGK = (c.position||'').toUpperCase() === 'GK';
  evo.upgrades.forEach(u => {
    const up = parseUpgrade(u);
    c.rating  = cap(parseInt(c.rating)  + up.overall);
    // For GK: PAC=DIV, SHO=HAN, PAS=KIC, DRI=REF, DEF=SPD, PHY=POS
    // upgrades still apply to the same underlying stat slots
    c.PAC     = cap(parseInt(c.PAC)     + up.overall);
    c.SHO     = cap(parseInt(c.SHO)     + up.overall);
    c.PAS     = cap(parseInt(c.PAS)     + up.overall);
    c.DRI     = cap(parseInt(c.DRI)     + up.overall);
    c.DEF     = cap(parseInt(c.DEF)     + up.overall);
    c.PHY     = cap(parseInt(c.PHY)     + up.overall);
    c.attack  = cap(parseInt(c.attack)  + up.attack);
    c.control = cap(parseInt(c.control) + up.control);
    c.defense = cap(parseInt(c.defense) + up.defense);
  });
  c.color = 'evo';
  return c;
}

function chainTotals(chain) {
  return chain.reduce((acc, evo) => {
    evo.upgrades.forEach(u => {
      const up = parseUpgrade(u);
      acc.overall += up.overall; acc.attack  += up.attack;
      acc.control += up.control; acc.defense += up.defense;
    });
    return acc;
  }, { overall:0, attack:0, control:0, defense:0 });
}

async function fetchWithTime(url, dbName) {
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    let players = data.fields?.players?.arrayValue?.values || [];
    if (data.fields?.evos?.arrayValue?.values) {
      const evos = data.fields.evos.arrayValue.values;
      const sorted = evos.slice().sort((a,b) =>
        (parseInt(b?.mapValue?.fields?.id?.integerValue??0)) - (parseInt(a?.mapValue?.fields?.id?.integerValue??0)));
      const top = sorted[0];
      if (top) {
        const nested = top?.mapValue?.fields?.players?.arrayValue?.values || [];
        players = nested.slice(1).map((p,i) => {
          const f = p?.mapValue?.fields||{};
          const eid = f?.id?.stringValue;
          const sid = (eid && eid!=='id001' && eid!=='id002' && eid!=='id003') ? eid : `evoElite_${data.name}_${i}`;
          return { ...p, mapValue:{ ...p.mapValue, fields:{ ...f, id:{ stringValue:sid } } } };
        });
      }
    }
    return players.map(p => ({ ...p, createTime:data.createTime||'1970-01-01T00:00:00Z', database:dbName }));
  } catch { return []; }
}

async function fetchAllPlayersRaw() {
  const BATCH = 20;
  const allRaw = [];

  for (const [db, url] of Object.entries(databases)) {
    if (singleDocumentDatabases.includes(db)) {
      const res = await fetchWithTime(url, db);
      allRaw.push(...res);
      continue;
    }
    const indices = Array.from({length:150},(_,i)=>i+1);
    for (let i = 0; i < indices.length; i += BATCH) {
      const batch = indices.slice(i, i+BATCH);
      const results = await Promise.all(batch.map(n => fetchWithTime(`${url}${n}`, db)));
      results.forEach(r => allRaw.push(...r));
    }
  }

  allRaw.sort((a,b) => new Date(b.createTime)-new Date(a.createTime));
  const live   = allRaw.filter(p => p.database==='livePlayers');
  const others = allRaw.filter(p => p.database!=='livePlayers');
  const tmap   = {};
  others.forEach(p => { const id=p?.mapValue?.fields?.id?.stringValue; if(id) tmap[id]=p.createTime; });
  const liveT  = live.map(p => { const id=p?.mapValue?.fields?.id?.stringValue; const t=tmap[id]; return t?{...p,createTime:t}:p; });
  const liveIds = new Set(live.map(p=>p?.mapValue?.fields?.id?.stringValue));
  const merged  = [...liveT, ...others.filter(p=>!liveIds.has(p?.mapValue?.fields?.id?.stringValue))];

  const prio = ['objectives','sbcGroups','draftCups','realmExport','evosElite','updates','livePlayers'];
  const gp   = db => { const i=prio.indexOf(db); return i===-1?999:i; };
  const idMap = new Map();
  merged.forEach(p => {
    const id = p?.mapValue?.fields?.id?.stringValue;
    if (!id) return;
    const ex = idMap.get(id);
    if (!ex) { idMap.set(id,p); return; }
    const winDb = gp(ex.database)<=gp(p.database) ? ex.database : p.database;
    if (new Date(p.createTime)>new Date(ex.createTime)) idMap.set(id,{...p,database:winDb});
    else idMap.set(id,{...ex,database:winDb});
  });
  return Array.from(idMap.values());
}

function buildChainsForCard(card, evos) {
  const unique = [], seen = new Set();
  evos.forEach(e => { if (!seen.has(e.name)) { seen.add(e.name); unique.push(e); } });
  const results = [];
  function dfs(cur, used) {
    let extended = false;
    for (const evo of unique) {
      if (used.find(e=>e.name===evo.name)) continue;
      if (evo.requirements.every(r=>meetsRequirement(r,cur))) {
        dfs(applyEvoToCard(cur,evo), [...used,evo]);
        extended = true;
      }
    }
    if (!extended && used.length >= 1) results.push([...used]);
  }
  dfs(card, []);
  return results;
}

  const img = mc?.url_big || `https://mf-data.b-cdn.net/26/Colors/${ck}_big.png`;
  const top = mc?.top_text_color    || '#000000';
  const mid = mc?.middle_text_color || '#FFFFFF';
  const bot = mc?.bottom_text_color || '#FFFFFF';
  const A=parseInt(card.attack)||0, C=parseInt(card.control)||0, D=parseInt(card.defense)||0;
  const h=Math.max(A,C,D), d=h-3;
  const fc=`${A<=h&&A>=d?1:0}${C<=h&&C>=d?1:0}${D<=h&&D>=d?1:0}`;
  const isGK = (card.position||'').toUpperCase()==='GK';
  const sl = isGK?['DIV','HAN','KIC','REF','SPD','POS']:['PAC','SHO','PAS','DRI','DEF','PHY'];
  const sv = [card.PAC,card.SHO,card.PAS,card.DRI,card.DEF,card.PHY];

  const altPositionsHTML = card.altPositions ? card.altPositions.split(',').map(pos => {
    const hex = mc?.alt_pos_background || '#333333';
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `<div class="alt-pos" style="background-color:rgba(${r},${g},${b},0.8);color:${mc?.alt_pos_text||'#fff'};border:1px solid ${mc?.alt_pos_outline||'#000'}">${pos.trim()}</div>`;
  }).join('') : '';

  const safeName = (card.name||'').replace(/'/g,"'").replace(/\s+/g,'_');

  return `
    <div class="card-wrapper">
      <div class="card">
        <button class="download-btn" onclick="event.preventDefault();event.stopPropagation();window._downloadEvoCard(this.closest('.card'),'${safeName}_${card.rating}_${ck}.png')">
          <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v4h4.66V9h3.84L12 2z"/></svg>
        </button>
        <img src="${img}" alt="${ck} card">
        <div class="overall-position">
          <div class="overall player-rating" style="color:${top}">${card.rating}</div>
          <div class="position player-position" style="color:${top}">${card.position}</div>
        </div>
        ${altPositionsHTML ? `<div class="alt-positions" style="display:${displayState.showAltPos?'flex':'none'}">${altPositionsHTML}</div>` : ''}
        <div class="player-name" style="color:${mid}">${card.name}</div>
        <div class="stats">
          ${sl.map((l,i)=>`<div class="stat"><div class="stat-label" style="color:${bot}">${l}</div><div class="stat-value" style="color:${bot}">${sv[i]}</div></div>`).join('')}
        </div>
        <div class="stats-separator"></div>
        <div class="fatals">
          <img class="fatal-bg" src="https://mf-data.b-cdn.net/26/Fatal/Stats/fatal_card_stats_${fc}.png" alt="">
          <div class="fatal-value-container">
            <div class="fatal-value">${card.attack}</div>
            <div class="fatal-value">${card.control}</div>
            <div class="fatal-value">${card.defense}</div>
          </div>
        </div>
        <div class="badges">
          <img class="badge flag"   src="https://mf-data.b-cdn.net/26/Badges/Nations/Large/nation_large_${card.nationId}.png" onerror="this.style.opacity='.15'" alt="">
          <img class="badge league" src="https://mf-data.b-cdn.net/26/Badges/Leagues/Large/league_large_${card.leagueId}.png" onerror="this.style.opacity='.15'" alt="">
          <img class="badge club"   src="https://mf-data.b-cdn.net/26/Badges/Clubs/Large/club_large_${card.clubId}.png"       onerror="this.style.opacity='.15'" alt="">
        </div>
        <img
          class="player-face"
          src="https://trivela.b-cdn.net/26/normalFacesSmall/${card.id}.png"
          alt="${card.name} Face"
          onerror="
            if (!this.dataset.step) {
              this.dataset.step = 'p';
              this.classList.add('normal-face');
              this.src = 'https://trivela.b-cdn.net/26/faces/p${card.id}.png';
            } else if (this.dataset.step === 'p') {
              this.dataset.step = 'base';
              this.classList.remove('normal-face');
              this.classList.add('fallback-face');
              this.src = 'https://trivela.b-cdn.net/26/normalFacesSmall/${card.baseId}.png';
            } else {
              this.onerror = null;
              this.classList.remove('normal-face');
              this.classList.add('fallback-face');
              this.src = 'Main Assets/boo.png';
            }
          "
        >
      </div>
    </div>`;
}

function renderChainCard({ player, chain, totals }) {
  let finalCard = { ...player };
  chain.forEach(evo => { finalCard = applyEvoToCard(finalCard, evo); });
  // Apply display state after render via requestAnimationFrame
  requestAnimationFrame(() => applyDisplayState());
  const pills = [
    totals.overall  ? `<span class="chain-pill" style="background:#dbeafe;color:#1e40af">+${totals.overall} OVR</span>` : '',
    totals.attack   ? `<span class="chain-pill" style="background:#fee2e2;color:#991b1b">+${totals.attack} ATK</span>`  : '',
    totals.control  ? `<span class="chain-pill" style="background:#fef3c7;color:#92400e">+${totals.control} CON</span>` : '',
    totals.defense  ? `<span class="chain-pill" style="background:#ede9fe;color:#4c1d95">+${totals.defense} DEF</span>` : '',
  ].filter(Boolean).join('');
  const evoItems = chain.map((evo,i)=>`
    <div class="chain-evo-item">
      <div class="chain-evo-num">${i+1}</div>
      <span>${evo.name}</span>
    </div>`).join('');
  return `
    <div class="chain-card">
      <div class="chain-card-visual">${buildCardHTML(finalCard)}</div>
      <div class="chain-info">
        <div class="chain-title">${player.name}</div>
        <div class="chain-evo-list">${evoItems}</div>
        <div class="chain-stat-pills">${pills}</div>
      </div>
    </div>`;
}

// ── Filter ────────────────────────────────────────────────
function filterAndSort() {
  const query    = normalise(window._currentSearch || '');
  const minRating = window.ratingState?.min ?? 0;
  const maxRating = window.ratingState?.max ?? 99;

const fs = { clubs: selectedClubs, leagues: selectedLeagues, nations: selectedNations, colors: selectedColors, positions: selectedPositions };

  filteredChains = allChains.filter(({ player, chain }) => {
    if (query && !normalise(player.name).includes(query)) return false;

    // Database source
    if (selectedDbs.size > 0 && !selectedDbs.has(player.database)) return false;

    // Chain length
    if (chainLenFilter !== 'all') {
      const len = parseInt(chainLenFilter);
      if (len === 4 ? chain.length < 4 : chain.length !== len) return false;
    }

    // Evo filter
    if (window._deselectedEvos?.size > 0) {
      if (chain.some(evo => window._deselectedEvos.has(evo.name))) return false;
    }
    if (window._mustIncludeEvo) {
      if (!chain.some(evo => evo.name === window._mustIncludeEvo)) return false;
    }

    // Compute final card stats after all evos applied
    const finalCard = chain.reduce((card, evo) => applyEvoToCard(card, evo), { ...player });

    // Rating (applied to final card)
    const r = parseInt(finalCard.rating)||0;
    if (r < minRating || r > maxRating) return false;

    // Stat filters (applied to final card)
    const cardIsGK = (finalCard.position||'').toUpperCase() === 'GK';
    for (const stat of STAT_KEYS) {
      const rules = statFiltersState[stat] || [];
      const lo = rules.find(r => r.op === '>=');
      const hi = rules.find(r => r.op === '<=');
      if (!lo && !hi) continue;
      const isGKStat = stat in GK_STAT_MAP;
      const isOutfieldStat = ['PAC','SHO','PAS','DRI','DEF','PHY'].includes(stat);
      // GK stat filters only apply to GK cards, using the mapped slot
      if (isGKStat) {
        if (!cardIsGK) continue; // skip GK stat filter for outfield cards
        const slot = GK_STAT_MAP[stat];
        const statVal = parseInt(finalCard[slot]) || 0;
        if (lo && statVal < lo.val) return false;
        if (hi && statVal > hi.val) return false;
      } else if (isOutfieldStat) {
        if (cardIsGK) continue; // skip outfield stat filter for GK cards
        const statVal = parseInt(finalCard[stat]) || 0;
        if (lo && statVal < lo.val) return false;
        if (hi && statVal > hi.val) return false;
      } else {
        // fatal/fcm stats apply to all
        const statVal = parseInt(finalCard[stat]) || 0;
        if (lo && statVal < lo.val) return false;
        if (hi && statVal > hi.val) return false;
      }
    }

    // Club / League / Nation / Color (base card)
    if (fs.clubs?.size   > 0 && !fs.clubs.has(String(player.clubId)))             return false;
    if (fs.leagues?.size > 0 && !fs.leagues.has(String(player.leagueId)))         return false;
    if (fs.nations?.size > 0 && !fs.nations.has(String(player.nationId)))         return false;
    if (fs.colors?.size  > 0 && !fs.colors.has((player.color||'').toLowerCase())) return false;

    // Position filtering — respects positionMode (main / alt / both)
    if (selectedPositions.size > 0 || selectedAltPositions.size > 0) {
      const mainPos = (player.position||'').toUpperCase();
      const altPos  = (player.altPositions||'').split(',').map(p => p.trim().toUpperCase()).filter(Boolean);

      if (positionMode === 'main') {
        if (!selectedPositions.has(mainPos)) return false;
      } else if (positionMode === 'alt') {
        if (!altPos.some(p => selectedAltPositions.has(p))) return false;
      } else {
        // Both mode: card must match main OR alt from the combined selected set
        const allSelected = new Set([...selectedPositions, ...selectedAltPositions]);
        const cardAllPos  = [mainPos, ...altPos];
        if (!cardAllPos.some(p => allSelected.has(p))) return false;
      }
    }

    // Misc filters
    if (miscState.genderMen    && player.gender === 'female') return false;
    if (miscState.genderWomen  && player.gender !== 'female') return false;
    if (miscState.totw         && player.totwNumber < 0) return false;
    if (miscState.totw && miscState.totwWeek && String(player.totwNumber) !== String(miscState.totwWeek)) return false;
    if (miscState.tradable     && player.untradeable === true) return false;
    if (miscState.untradeable  && player.untradeable !== true) return false;
    if (miscState.dynamicImage && !player.dynamicImage) return false;

    return true;
  });

  // Sort
  const activeSortRules = window._evoSortRules?.length ? window._evoSortRules : [{ field:'date', dir:'desc' }];
  filteredChains.sort((a, b) => {
    const aFinal = a.chain.reduce((card, evo) => applyEvoToCard(card, evo), { ...a.player });
    const bFinal = b.chain.reduce((card, evo) => applyEvoToCard(card, evo), { ...b.player });

    for (const rule of activeSortRules) {
      const { field, dir } = rule;
      const mul = dir === 'asc' ? 1 : -1;
      let cmp = 0;
      if (field === 'name')
        cmp = a.player.name.localeCompare(b.player.name) * mul;
      else if (field === 'rating')
        cmp = ((parseInt(aFinal.rating)||0) - (parseInt(bFinal.rating)||0)) * mul;
      else if (field === 'date' || field === 'added_at')
        cmp = (new Date(a.player.createTime) - new Date(b.player.createTime)) * mul;
      else if (field === 'net_fatal')
        cmp = (Math.max(parseInt(aFinal.attack)||0, parseInt(aFinal.control)||0, parseInt(aFinal.defense)||0) - (parseInt(aFinal.rating)||0)
             - Math.max(parseInt(bFinal.attack)||0, parseInt(bFinal.control)||0, parseInt(bFinal.defense)||0) + (parseInt(bFinal.rating)||0)) * mul;
      else if (field === 'total_fatal')
        cmp = ((parseInt(aFinal.attack)||0) + (parseInt(aFinal.control)||0) + (parseInt(aFinal.defense)||0)
             - (parseInt(bFinal.attack)||0) - (parseInt(bFinal.control)||0) - (parseInt(bFinal.defense)||0)) * mul;
      else if (field === 'attack')
        cmp = ((parseInt(aFinal.attack)||0) - (parseInt(bFinal.attack)||0)) * mul;
      else if (field === 'control')
        cmp = ((parseInt(aFinal.control)||0) - (parseInt(bFinal.control)||0)) * mul;
      else if (field === 'defense')
        cmp = ((parseInt(aFinal.defense)||0) - (parseInt(bFinal.defense)||0)) * mul;
      else if (field === 'pac')
        cmp = ((parseInt(aFinal.PAC)||0) - (parseInt(bFinal.PAC)||0)) * mul;
      else if (field === 'sho')
        cmp = ((parseInt(aFinal.SHO)||0) - (parseInt(bFinal.SHO)||0)) * mul;
      else if (field === 'pas')
        cmp = ((parseInt(aFinal.PAS)||0) - (parseInt(bFinal.PAS)||0)) * mul;
      else if (field === 'dri')
        cmp = ((parseInt(aFinal.DRI)||0) - (parseInt(bFinal.DRI)||0)) * mul;
      else if (field === 'def')
        cmp = ((parseInt(aFinal.DEF)||0) - (parseInt(bFinal.DEF)||0)) * mul;
      else if (field === 'phy')
        cmp = ((parseInt(aFinal.PHY)||0) - (parseInt(bFinal.PHY)||0)) * mul;
      else if (field === 'div')
        cmp = ((parseInt(aFinal.PAC)||0) - (parseInt(bFinal.PAC)||0)) * mul;
      else if (field === 'han')
        cmp = ((parseInt(aFinal.SHO)||0) - (parseInt(bFinal.SHO)||0)) * mul;
      else if (field === 'kic')
        cmp = ((parseInt(aFinal.PAS)||0) - (parseInt(bFinal.PAS)||0)) * mul;
      else if (field === 'ref')
        cmp = ((parseInt(aFinal.DRI)||0) - (parseInt(bFinal.DRI)||0)) * mul;
      else if (field === 'spd')
        cmp = ((parseInt(aFinal.DEF)||0) - (parseInt(bFinal.DEF)||0)) * mul;
      else if (field === 'pos')
        cmp = ((parseInt(aFinal.PHY)||0) - (parseInt(bFinal.PHY)||0)) * mul;
      if (cmp !== 0) return cmp;
    }
    return new Date(b.player.createTime) - new Date(a.player.createTime);
  });

  currentPage = 1;
  totalPages  = Math.max(1, Math.ceil(filteredChains.length / CHAINS_PER_PAGE));
  renderPage();
}

function renderPage() {
  const grid  = document.getElementById('chains-grid');
  const start = (currentPage-1) * CHAINS_PER_PAGE;
  const slice = filteredChains.slice(start, start+CHAINS_PER_PAGE);

  grid.innerHTML = slice.length
    ? slice.map(renderChainCard).join('')
    : '<p style="color:var(--muted,#787878);font-family:\'Roboto Condensed\',sans-serif;padding:20px;grid-column:1/-1">No evo chains found.</p>';
  applyDisplayState();

  const s = filteredChains.length===0 ? 0 : (currentPage-1)*CHAINS_PER_PAGE+1;
  const e = Math.min(currentPage*CHAINS_PER_PAGE, filteredChains.length);
  document.getElementById('resultsCount').textContent =
    filteredChains.length===0 ? 'No chains'
    : `Showing ${s}–${e} of ${filteredChains.length} chain${filteredChains.length!==1?'s':''}`;

  const pag = document.getElementById('evoPagination');
  pag.style.display = filteredChains.length<=CHAINS_PER_PAGE ? 'none' : 'flex';
  document.getElementById('evoPageInput').value        = currentPage;
  document.getElementById('evoPageInput').max          = totalPages;
  document.getElementById('evoPageInfo').textContent   = `of ${totalPages}`;
  document.getElementById('evoPageFirst').disabled = currentPage<=1;
  document.getElementById('evoPagePrev').disabled  = currentPage<=1;
  document.getElementById('evoPageNext').disabled  = currentPage>=totalPages;
  document.getElementById('evoPageLast').disabled  = currentPage>=totalPages;
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── Public entry point ────────────────────────────────────
function setupEvoFilterSections(evoNames) {
  _evoNames = evoNames;
  _refreshAllSections();
}

// ── Pagination ────────────────────────────────────────────
document.getElementById('evoPageFirst').addEventListener('click', () => { if(currentPage>1){ currentPage=1; renderPage(); } });
document.getElementById('evoPageLast').addEventListener('click',  () => { if(currentPage<totalPages){ currentPage=totalPages; renderPage(); } });
document.getElementById('evoPagePrev').addEventListener('click',  () => { if(currentPage>1){ currentPage--; renderPage(); } });
document.getElementById('evoPageNext').addEventListener('click',  () => { if(currentPage<totalPages){ currentPage++; renderPage(); } });
document.getElementById('evoPageInput').addEventListener('change', e => {
  let v = parseInt(e.target.value);
  if(isNaN(v)||v<1) v=1; if(v>totalPages) v=totalPages;
  currentPage=v; renderPage();
});

// ── Expose for Filter.js to call ─────────────────────────
window._initDone = false;
window._currentSearch = '';
window._cardShowToast = msg => {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  c.appendChild(t); setTimeout(()=>t.remove(),3000);
};
window._allPlayers = [];

// ── Main ──────────────────────────────────────────────────
async function init() {
  await fetchRemoteCardDesigns();
const results = await Promise.all([
    fetchAllPlayersRaw(),
    fetchAllEvosStandard(),
  ]);
const allPlayers = results[0];
  const allEvos = results[1];
  console.log('Players:', allPlayers.length);
  console.log('Evos:', allEvos.length, allEvos.slice(0,3));
  console.log('Sample evo requirements:', allEvos[0]?.requirements);
  console.log('Sample player card:', allPlayers[0] ? playerToCard(allPlayers[0]) : 'none');
  const testCard = allPlayers[0] ? playerToCard(allPlayers[0]) : null;
  if (testCard && allEvos[0]) {
    allEvos[0].requirements.forEach(r => {
      console.log(`Req "${r}" meets?`, meetsRequirement(r, testCard));
    });
  }

  allPlayers.forEach(player => {
    let card; try { card = playerToCard(player); } catch { return; }
    buildChainsForCard(card, allEvos).forEach(chain => {
      allChains.push({ player:card, chain, totals:chainTotals(chain) });
    });
  });

  document.getElementById('chain-loading').style.display = 'none';
  document.getElementById('chains-grid').style.display   = '';

  const evoNames = [...new Set(allEvos.map(e => e.name))].sort((a, b) => a.localeCompare(b));
setupEvoFilterSections(evoNames);
  console.log('Chains built:', allChains.length);
  window._initDone = true;
  window._filterAndSort = () => filterAndSort();
  filterAndSort();
}

window._downloadEvoCard = async function(cardEl, filename) {
  try {
    const btn = cardEl.querySelector('.download-btn');
    if (btn) btn.style.display = 'none';
    const canvas = await html2canvas(cardEl, {
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      scale: 2,
    });
    if (btn) btn.style.display = 'flex';
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    console.error('Download failed', e);
    const btn = cardEl.querySelector('.download-btn');
    if (btn) btn.style.display = 'flex';
  }
};

init().catch(err => {
  document.getElementById('chain-loading').innerHTML =
    `<span style="color:var(--muted,#787878);font-family:'Roboto Condensed',sans-serif">Failed to load: ${err.message}</span>`;
});
</script>
