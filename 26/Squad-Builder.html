<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squad Builder — MF26 Data</title>
<link rel="icon" type="image/x-icon" href="https://mf-data.b-cdn.net/web/Data Mini Logo (1).png">
<link rel="stylesheet" href="/style.css">
<style>
/* ============================================================
   SQUAD BUILDER — PAGE STYLES
   ============================================================ */

:root {
  --pitch-green:    #1a7a3a;
  --pitch-dark:     #155e2d;
  --pitch-line:     rgba(255,255,255,0.18);
  --slot-empty:     rgba(255,255,255,0.07);
  --slot-border:    rgba(255,255,255,0.2);
  --slot-hover:     rgba(255,255,255,0.14);
  --panel-bg:       #ffffff;
  --panel-border:   var(--bg-grey);
  --chip-bg:        var(--bg-grey);
  --formation-h:    40px;
}

/* ── Layout ── */
.sb-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
  align-items: start;
  margin-top: 4px;
}

@media (max-width: 900px) {
  .sb-layout { grid-template-columns: 1fr; }
}

/* ── Formation selector bar ── */
.formation-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.formation-label {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

.formation-select {
  height: var(--formation-h);
  padding: 0 14px;
  border-radius: 10px;
  border: 1.5px solid var(--bg-grey);
  background: var(--panel-bg);
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--dark);
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
  flex: 1;
  max-width: 200px;
}
.formation-select:focus { border-color: var(--dark); }

.sb-action-btn {
  height: var(--formation-h);
  padding: 0 16px;
  border-radius: 10px;
  border: 1.5px solid var(--bg-grey);
  background: var(--panel-bg);
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--mid);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.sb-action-btn:hover { background: var(--bg-grey); border-color: var(--dark); color: var(--dark); }
.sb-action-btn.primary {
  background: var(--dark);
  color: #fff;
  border-color: var(--dark);
}
.sb-action-btn.primary:hover { background: #444; }

/* ── Pitch wrapper ── */
.pitch-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 140%;
  border-radius: 14px;
  overflow: hidden;
  background: var(--pitch-green);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}

/* Pitch markings via SVG overlay */
.pitch-markings {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* Alternating grass stripes */
.pitch-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent 0%,
    transparent 9.09%,
    rgba(0,0,0,0.06) 9.09%,
    rgba(0,0,0,0.06) 18.18%
  );
  pointer-events: none;
  z-index: 0;
}

/* ── Player slot on pitch ── */
.pitch-slots {
  position: absolute;
  inset: 0;
  z-index: 2;
}

.pitch-slot {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  z-index: 5;
  transition: filter 0.2s;
}
.pitch-slot:hover { filter: brightness(1.08); }

/* Empty slot */
.slot-empty-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px dashed var(--slot-border);
  background: var(--slot-empty);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
  backdrop-filter: blur(4px);
}
.pitch-slot:hover .slot-empty-circle {
  background: var(--slot-hover);
  border-color: rgba(255,255,255,0.5);
}

.slot-pos-label {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.5px;
}

.slot-plus {
  font-size: 18px;
  color: rgba(255,255,255,0.4);
  line-height: 1;
}

/* Slot name tag below circle */
.slot-name-tag {
  margin-top: 4px;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  max-width: 70px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.3px;
}

/* Slot with card — mini card */
.slot-card {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.slot-card-img-wrap {
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  overflow: visible;
}

/* The card background image clipped to circle */
.slot-card-bg {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.5);
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

/* Player face inside circle */
.slot-face {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
}

/* Rating badge on slot */
.slot-rating-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: var(--dark);
  color: #fff;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  border-radius: 6px;
  padding: 1px 4px;
  line-height: 1.4;
  border: 1.5px solid rgba(255,255,255,0.3);
}

/* Remove btn */
.slot-remove-btn {
  position: absolute;
  top: -6px;
  left: -6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #c0392b;
  color: #fff;
  font-size: 11px;
  line-height: 18px;
  text-align: center;
  border: none;
  cursor: pointer;
  display: none;
  z-index: 10;
  font-weight: 700;
}
.pitch-slot:hover .slot-remove-btn { display: block; }

/* ── Right panel ── */
.sb-panel {
  background: var(--panel-bg);
  border: 1.5px solid var(--panel-border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 200px);
  position: sticky;
  top: calc(var(--nav-h) + var(--bc-h) + 12px);
}

.sb-panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}

.sb-panel-title {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.sb-search-wrap {
  position: relative;
}
.sb-search-input {
  width: 100%;
  background: var(--bg-grey);
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 9px 34px 9px 12px;
  font-size: 13px;
  color: var(--dark);
  outline: none;
  font-family: 'Roboto Condensed', sans-serif;
  box-sizing: border-box;
}
.sb-search-input:focus { border-color: var(--dark); }
.sb-search-input::placeholder { color: var(--muted); }
.sb-search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 17px;
}

.sb-panel-subtitle {
  padding: 8px 16px 4px;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}

/* Player list */
.sb-player-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.sb-player-list::-webkit-scrollbar { width: 4px; }
.sb-player-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

.sb-player-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.sb-player-row:hover { background: var(--bg-grey); }
.sb-player-row.in-squad {
  opacity: 0.4;
  pointer-events: none;
}

.sb-player-color-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  background: var(--bg-grey);
}
.sb-player-color-dot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.sb-player-info {
  flex: 1;
  min-width: 0;
}
.sb-player-name {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sb-player-meta {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  color: var(--muted);
}

.sb-player-rating {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
}

/* ── Squad stats bar ── */
.squad-stats {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border: 1.5px solid var(--panel-border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--panel-bg);
}
.squad-stat {
  flex: 1;
  text-align: center;
  padding: 10px 6px;
  border-right: 1px solid var(--panel-border);
}
.squad-stat:last-child { border-right: none; }
.squad-stat-val {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1;
}
.squad-stat-lbl {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}

/* ── Slot tooltip / selected position ── */
.active-slot-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--dark);
  color: #fff;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border-radius: 8px;
  margin-bottom: 10px;
}
.active-slot-indicator.visible { display: flex; }
.active-slot-pos {
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 13px;
}

/* ── Empty state ── */
.sb-empty-state {
  padding: 30px 20px;
  text-align: center;
  color: var(--muted);
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px;
}
.sb-empty-icon { font-size: 28px; margin-bottom: 8px; }

/* ── Loading ── */
.sb-loading {
  padding: 20px;
  text-align: center;
  font-family: 'Roboto Condensed', sans-serif;
  color: var(--muted);
  font-size: 13px;
}

/* ── Position filter chips ── */
.pos-filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}
.pos-filter-chip {
  padding: 3px 9px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background: #fff;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--mid);
  cursor: pointer;
  transition: all 0.15s;
}
.pos-filter-chip:hover { border-color: var(--dark); color: var(--dark); }
.pos-filter-chip.active { background: var(--dark); color: #fff; border-color: var(--dark); }

/* ── Chemistry display ── */
.chem-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 16px;
}
.chem-bar-label {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.chem-bar-track {
  flex: 1;
  height: 6px;
  background: var(--bg-grey);
  border-radius: 3px;
  overflow: hidden;
}
.chem-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #27ae60, #2ecc71);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.chem-bar-value {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--dark);
  min-width: 30px;
  text-align: right;
}

/* ── Share / Export ── */
.export-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

/* ── Responsive pitch slot sizes ── */
@media (max-width: 600px) {
  .slot-empty-circle,
  .slot-card-bg { width: 40px; height: 40px; }
  .slot-face { width: 34px; height: 34px; }
  .slot-name-tag { font-size: 8px; max-width: 52px; }
  .slot-rating-badge { font-size: 9px; }
  .sb-panel { max-height: 60vh; position: relative; top: auto; }
}
</style>
</head>

<main class="main-content" id="main-content">
  <h1 class="page-heading">SQUAD BUILDER</h1>
  <p class="page-desc">Pick a formation and fill your squad from your card database.</p>

  <!-- Formation bar -->
  <div class="formation-bar">

    <div class="squad-stat">

    <div class="squad-stat">
      <div class="squad-stat-val" id="statMaxFatal">—</div>

    </div>
    <div class="squad-stat">
      <div class="squad-stat-val" id="statHighestRated">—</div>

    </div>

    <div>

          <!-- Border -->
          <rect x="4" y="4" width="92" height="132" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
          <!-- Halfway line -->
          <line x1="4" y1="70" x2="96" y2="70" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
          <!-- Centre circle -->
          <circle cx="50" cy="70" r="10" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>

          <!-- Top penalty area -->

          <!-- Top six-yard box -->

          <!-- Penalty spots -->

          <!-- Corner arcs -->

          <path d="M92,4 A4,4 0 0,1 96,8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
          <path d="M4,132 A4,4 0 0,0 8,136" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
          <path d="M92,136 A4,4 0 0,0 96,132" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>

        <div class="pitch-slots" id="pitchSlots"></div>

    <!-- Right panel -->
    <div class="sb-panel">
      <div class="sb-panel-header">
        <div class="sb-panel-title" id="panelTitle">Select a slot to add a player</div>

        <!-- Active slot indicator -->
        <div class="active-slot-indicator" id="activeSlotIndicator">
          <span>Filling position</span>
          <span class="active-slot-pos" id="activeSlotPos">—</span>

        <!-- Search -->
        <div class="sb-search-wrap">
          <input class="sb-search-input" id="sbSearchInput" type="text" placeholder="Search player…" autocomplete="off">
          <button class="sb-search-clear" id="sbSearchClear">×</button>

      <!-- Position filter chips -->
      <div class="pos-filter-row" id="posFilterRow">
        <span class="pos-filter-chip active" data-pos="">All</span>
        <span class="pos-filter-chip" data-pos="GK">GK</span>
        <span class="pos-filter-chip" data-pos="CB">CB</span>

<script>
// ============================================================
// SQUAD BUILDER — main script
// ============================================================

// ── State ──────────────────────────────────────────────────
let allFormations  = [];
let allPlayers     = [];
let currentFormation = null;   // { name, positions[] }
let squad          = [];       // array of 11: null | player object
let activeSlotIdx  = null;     // which slot is being filled
let colorMap       = {};

let searchQuery    = '';
let posFilter      = '';       // '' = all

// ── DOM refs ───────────────────────────────────────────────
const formationSelect      = document.getElementById('formationSelect');
const pitchSlots           = document.getElementById('pitchSlots');
const sbPlayerList         = document.getElementById('sbPlayerList');
const sbSearchInput        = document.getElementById('sbSearchInput');
const sbSearchClear        = document.getElementById('sbSearchClear');
const activeSlotIndicator  = document.getElementById('activeSlotIndicator');
const activeSlotPos        = document.getElementById('activeSlotPos');
const panelTitle           = document.getElementById('panelTitle');
const playerListSubtitle   = document.getElementById('playerListSubtitle');
const posFilterRow         = document.getElementById('posFilterRow');
const clearSquadBtn        = document.getElementById('clearSquadBtn');
const autoFillBtn          = document.getElementById('autoFillBtn');

// ── Position layout on pitch (x%, y%) ─────────────────────
// We compute these dynamically from the formation JSON,
// using canonical row positions for each position group.

// Define the y-band for each positional group (top = attacking end, GK at bottom)
// Pitch height = 140 viewBox units, usable from ~8 to ~136 (leaving line margins)
// We flip: attackers at top of visual pitch (low y%), GK at bottom (high y%)

function getSlotLayout(positions) {
  // Group positions by row, from top (attackers) to bottom (GK)
  const rowOrder = ['ST','LW','RW','LM','RM','CAM','CM','CDM','LB','CB','RB','GK'];
  
  // Build groups: each unique "row" is determined by matching position types
  // We parse them greedily top→bottom
  const rowDefs = [
    { keys: ['ST','CF'],         y: 12 },
    { keys: ['LW','RW'],         y: 22 },
    { keys: ['CAM'],             y: 30 },
    { keys: ['LM','RM','CM'],    y: 40 },
    { keys: ['CDM'],             y: 50 },
    { keys: ['LB','RB','CB'],    y: 72 },
    { keys: ['GK'],              y: 88 },
  ];

  // Assign each position to a row
  const rowMap = {};
  rowDefs.forEach(r => r.keys.forEach(k => { rowMap[k] = r.y; }));

  // Bucket positions by row y
  const byY = {};
  positions.forEach((pos, i) => {
    const y = rowMap[pos] ?? 55;
    if (!byY[y]) byY[y] = [];
    byY[y].push({ pos, i });
  });

  // Within each row, spread x evenly
  const layout = [];
  Object.keys(byY).sort((a,b)=>a-b).forEach(y => {
    const group = byY[y];
    const count = group.length;
    group.forEach((item, j) => {
      const x = count === 1 ? 50 : 10 + (80 / (count - 1)) * j;
      layout[item.i] = { x, y: parseFloat(y), pos: item.pos };
    });
  });

  // Convert to percentage of wrap
  return layout.map(({ x, y, pos }) => ({
    x: `${x}%`,
    y: `${y}%`,
    pos
  }));
}

// ── Data loading ───────────────────────────────────────────
async function loadFormations() {
  try {
    const res  = await fetch('json/formations.json');
    const data = await res.json();
    allFormations = data.formations || [];
    populateFormationSelect();
  } catch (e) {
    console.error('Failed to load formations:', e);
    // Fallback: hard-coded common formations
    allFormations = [
      { name: '4-3-3',   positions: ['GK','CB','CB','LB','RB','CM','CM','CM','LW','ST','RW'] },
      { name: '4-4-2',   positions: ['GK','CB','CB','LB','RB','LM','CM','CM','RM','ST','ST'] },
      { name: '4-2-3-1', positions: ['GK','CB','CB','LB','RB','CDM','CDM','LM','CAM','RM','ST'] },
      { name: '3-5-2',   positions: ['GK','CB','CB','CB','LM','CM','CM','RM','CAM','ST','ST'] },
    ];
    populateFormationSelect();
  }
}

function populateFormationSelect() {
  formationSelect.innerHTML = allFormations.map(f =>
    `<option value="${f.name}">${f.name}</option>`
  ).join('');
  selectFormation(allFormations[0]);
  formationSelect.addEventListener('change', () => {
    const f = allFormations.find(x => x.name === formationSelect.value);
    if (f) selectFormation(f);
  });
}

function selectFormation(formation) {
  currentFormation = formation;
  squad = new Array(11).fill(null);
  activeSlotIdx = null;
  renderPitch();
  updateStats();
  renderPlayerList();
  clearActiveSlot();
}

// ── Card designs ───────────────────────────────────────────
async function loadCardDesigns() {
  try {
    const [localRes] = await Promise.all([fetch('json/Color.json')]);
    const localData  = localRes.ok ? await localRes.json() : null;
    if (localData?.documents) {
      localData.documents.forEach(doc => {
        let imgs = doc.fields?.images?.arrayValue?.values || [];
        if (!imgs.length && doc.mapValue?.fields) imgs = [doc];
        imgs.forEach(item => {
          const fields = item.mapValue?.fields || {};
          const id     = (fields.id?.stringValue || fields.name?.stringValue || '').trim().toLowerCase();
          if (!id) return;
          colorMap[id] = {
            url_big:   fields.url_big?.stringValue   || null,
            url_micro: fields.url_micro?.stringValue || null,
            url_small: fields.url_small?.stringValue || null,
          };
        });
      });
    }
  } catch (e) { /* silent — images will fall back */ }
}

// ── Player loading ─────────────────────────────────────────
const DB_SOURCES = {
  updates:     'https://firestore.googleapis.com/v1/projects/trivela-madfut/databases/(default)/documents/updates/',
  sbcGroups:   'https://firestore.googleapis.com/v1/projects/trivela-madfut/databases/(default)/documents/sbcGroups/',
  objectives:  'https://firestore.googleapis.com/v1/projects/trivela-madfut/databases/(default)/documents/objectives/',
  realmExport: 'json/realmExport.json',
};

async function fetchSource(url, dbName) {
  try {
    const res  = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    const players = data.fields?.players?.arrayValue?.values || [];
    return players.map(p => ({
      ...p,
      createTime: data.createTime || '1970',
      database:   dbName
    }));
  } catch { return []; }
}

async function loadPlayers() {
  const promises = [];
  promises.push(fetchSource(DB_SOURCES.realmExport, 'realmExport'));
  for (let i = 50; i >= 1; i--) {
    promises.push(fetchSource(`${DB_SOURCES.updates}${i}`, 'updates'));
    promises.push(fetchSource(`${DB_SOURCES.sbcGroups}${i}`, 'sbcGroups'));
    promises.push(fetchSource(`${DB_SOURCES.objectives}${i}`, 'objectives'));
  }

  const results = await Promise.all(promises);
  const combined = results.flat();

  // Deduplicate by id, prefer updates > sbcGroups > realmExport
  const priority = { objectives: 0, sbcGroups: 1, updates: 2, realmExport: 3 };
  const idMap = new Map();
  combined.forEach(p => {
    const id = p?.mapValue?.fields?.id?.stringValue;
    if (!id) return;
    const existing = idMap.get(id);
    if (!existing) { idMap.set(id, p); return; }
    if ((priority[p.database] ?? 99) < (priority[existing.database] ?? 99)) {
      idMap.set(id, p);
    }
  });

  allPlayers = Array.from(idMap.values()).filter(p => {
    const f = p?.mapValue?.fields || {};
    return f.name?.stringValue && f.rating?.integerValue;
  });
  allPlayers.sort((a,b) =>
    parseInt(b.mapValue.fields.rating?.integerValue||0) - parseInt(a.mapValue.fields.rating?.integerValue||0)
  );

  playerListSubtitle.textContent = `${allPlayers.length.toLocaleString()} players loaded`;
  renderPlayerList();
}

// ── Pitch rendering ────────────────────────────────────────
function renderPitch() {
  if (!currentFormation) return;
  const positions = currentFormation.positions;
  const layout    = getSlotLayout(positions);

  pitchSlots.innerHTML = '';
  layout.forEach((slot, i) => {
    const el = document.createElement('div');
    el.className = 'pitch-slot';
    el.style.left = slot.x;
    el.style.top  = slot.y;
    el.dataset.slotIdx = i;
    el.addEventListener('click', () => onSlotClick(i));
    pitchSlots.appendChild(el);
  });

  refreshAllSlots();
}

function refreshAllSlots() {
  if (!currentFormation) return;
  const positions = currentFormation.positions;
  const layout    = getSlotLayout(positions);

  document.querySelectorAll('.pitch-slot').forEach((el, i) => {
    const player = squad[i];
    const pos    = positions[i];
    el.innerHTML = player ? buildFilledSlot(player, pos) : buildEmptySlot(pos);
  });
}

function buildEmptySlot(pos) {
  return `
    <div class="slot-empty-circle">
      <span class="slot-pos-label">${pos}</span>
      <span class="slot-plus">+</span>
    </div>
    <div class="slot-name-tag">${pos}</div>`;
}

function buildFilledSlot(player, pos) {
  const f        = player.mapValue.fields;
  const name     = f.name?.stringValue     || '?';
  const rating   = f.rating?.integerValue  || '?';
  const colorKey = (f.color?.stringValue   || 'default').toLowerCase();
  const id       = (f.id?.stringValue || '').replace('id','');
  const baseId   = f.baseId?.integerValue  || id;

  const cardImg = colorMap[colorKey]?.url_small
    || `https://mf-data.b-cdn.net/26/Colors/${colorKey}_big.png`;

  const shortName = name.split(' ').pop();

  return `
    <div class="slot-card">
      <div class="slot-card-img-wrap">
        <img class="slot-card-bg" src="${cardImg}" alt="" onerror="this.style.display='none'">
        <img class="slot-face" 
          src="https://trivela.b-cdn.net/26/normalFacesSmall/${id}.png"
          onerror="this.src='https://trivela.b-cdn.net/26/normalFacesSmall/${baseId}.png';this.onerror=()=>this.style.display='none'"
          alt="${name}">
        <span class="slot-rating-badge">${rating}</span>
        <button class="slot-remove-btn" onclick="event.stopPropagation();removePlayer(${document.querySelectorAll('.pitch-slot').length - [...document.querySelectorAll('.pitch-slot')].reverse().findIndex(s=>s.dataset.slotIdx==s.dataset.slotIdx)})">×</button>
      </div>
      <div class="slot-name-tag">${shortName}</div>
    </div>`;
}

// Better remove function — attached via event delegation
function removePlayer(slotIdx) {
  squad[slotIdx] = null;
  refreshAllSlots();
  updateStats();
  renderPlayerList();
}

// Delegate remove clicks from pitch
pitchSlots.addEventListener('click', e => {
  const btn = e.target.closest('.slot-remove-btn');
  if (!btn) return;
  e.stopPropagation();
  const slot = btn.closest('.pitch-slot');
  if (slot) {
    const i = parseInt(slot.dataset.slotIdx);
    squad[i] = null;
    refreshAllSlots();
    updateStats();
    renderPlayerList();
  }
});

// ── Slot selection ─────────────────────────────────────────
function onSlotClick(idx) {
  // If clicking filled slot, do nothing (use remove btn)
  if (squad[idx]) return;

  activeSlotIdx = idx;
  const pos = currentFormation.positions[idx];
  activeSlotPos.textContent = pos;
  activeSlotIndicator.classList.add('visible');
  panelTitle.textContent = `Picking player for slot ${idx + 1}`;

  // Auto-filter panel to this position
  posFilter = pos;
  updatePosChips();
  renderPlayerList();
}

function clearActiveSlot() {
  activeSlotIdx = null;
  activeSlotIndicator.classList.remove('visible');
  panelTitle.textContent = 'Select a slot to add a player';
}

// ── Player list rendering ──────────────────────────────────
function renderPlayerList() {
  const inSquadIds = new Set(
    squad.filter(Boolean).map(p => p.mapValue.fields.id?.stringValue)
  );

  const query = searchQuery.toLowerCase().trim();
  const filtered = allPlayers.filter(p => {
    const f    = p.mapValue.fields;
    const name = (f.name?.stringValue || '').toLowerCase();
    const pos  = (f.position?.stringValue || '').toUpperCase();
    const altP = (f.altPositions?.stringValue || '').toUpperCase();

    if (query && !name.includes(query)) return false;
    if (posFilter) {
      const matches = pos === posFilter || altP.split(',').map(s=>s.trim()).includes(posFilter);
      if (!matches) return false;
    }
    return true;
  });

  if (!filtered.length) {
    sbPlayerList.innerHTML = `<div class="sb-empty-state"><div class="sb-empty-icon">🔍</div>No players found</div>`;
    return;
  }

  const sliceSize = 80;
  const shown     = filtered.slice(0, sliceSize);

  sbPlayerList.innerHTML = shown.map(p => {
    const f        = p.mapValue.fields;
    const name     = f.name?.stringValue     || '?';
    const rating   = f.rating?.integerValue  || '?';
    const pos      = f.position?.stringValue || '?';
    const colorKey = (f.color?.stringValue   || 'default').toLowerCase();
    const id       = (f.id?.stringValue || '').replace('id','');
    const inSquad  = inSquadIds.has(f.id?.stringValue);

    const cardImg = colorMap[colorKey]?.url_micro
      || `https://mf-data.b-cdn.net/26/Colors/${colorKey}_big.png`;

    return `
    <div class="sb-player-row ${inSquad ? 'in-squad' : ''}"
      data-id="${f.id?.stringValue || ''}"
      data-name="${name.replace(/"/g,'&quot;')}"
      data-pos="${pos}">
      <div class="sb-player-color-dot">
        <img src="${cardImg}" alt="" onerror="this.style.display='none'">
      </div>
      <div class="sb-player-info">
        <div class="sb-player-name">${name}</div>
        <div class="sb-player-meta">${pos}${f.altPositions?.stringValue ? ' · ' + f.altPositions.stringValue : ''}</div>
      </div>
      <div class="sb-player-rating">${rating}</div>
    </div>`;
  }).join('');

  if (filtered.length > sliceSize) {
    sbPlayerList.innerHTML += `<div class="sb-empty-state" style="padding:10px">…and ${filtered.length - sliceSize} more. Refine search to narrow results.</div>`;
  }

  // Attach click events
  sbPlayerList.querySelectorAll('.sb-player-row:not(.in-squad)').forEach(row => {
    row.addEventListener('click', () => {
      const id     = row.dataset.id;
      const player = allPlayers.find(p => p.mapValue.fields.id?.stringValue === id);
      if (!player) return;

      if (activeSlotIdx !== null) {
        squad[activeSlotIdx] = player;
        refreshAllSlots();
        updateStats();
        clearActiveSlot();
        posFilter = '';
        updatePosChips();
        renderPlayerList();
      } else {
        // Find first empty slot
        const firstEmpty = squad.findIndex(s => s === null);
        if (firstEmpty === -1) return;
        squad[firstEmpty] = player;
        refreshAllSlots();
        updateStats();
        renderPlayerList();
      }
    });
  });
}

// ── Position filter chips ──────────────────────────────────
posFilterRow.addEventListener('click', e => {
  const chip = e.target.closest('.pos-filter-chip');
  if (!chip) return;
  posFilter = chip.dataset.pos;
  updatePosChips();
  renderPlayerList();
});

function updatePosChips() {
  posFilterRow.querySelectorAll('.pos-filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.pos === posFilter);
  });
}

// ── Search ─────────────────────────────────────────────────
sbSearchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  renderPlayerList();
});
sbSearchClear.addEventListener('click', () => {
  sbSearchInput.value = '';
  searchQuery = '';
  renderPlayerList();
});

// ── Squad stats ────────────────────────────────────────────
function updateStats() {
  const filled   = squad.filter(Boolean);
  const filledN  = filled.length;
  const ratings  = filled.map(p => parseInt(p.mapValue.fields.rating?.integerValue || 0));
  const avgRat   = filledN ? Math.round(ratings.reduce((a,b)=>a+b,0)/filledN) : null;
  const maxRat   = filledN ? Math.max(...ratings) : null;

  const fatals = filled.map(p => {
    const f = p.mapValue.fields;
    return Math.max(
      parseInt(f.attack?.integerValue  || 0),
      parseInt(f.control?.integerValue || 0),
      parseInt(f.defense?.integerValue || 0)
    );
  });
  const bestFatal = filledN ? Math.max(...fatals) : null;

  document.getElementById('statFilled').textContent     = `${filledN}/11`;
  document.getElementById('statAvgRating').textContent  = avgRat   ?? '—';
  document.getElementById('statMaxFatal').textContent   = bestFatal ?? '—';
  document.getElementById('statHighestRated').textContent = maxRat  ?? '—';
}

// ── Clear / AutoFill ───────────────────────────────────────
clearSquadBtn.addEventListener('click', () => {
  squad = new Array(11).fill(null);
  activeSlotIdx = null;
  clearActiveSlot();
  refreshAllSlots();
  updateStats();
  renderPlayerList();
});

autoFillBtn.addEventListener('click', () => {
  if (!currentFormation) return;
  const positions = currentFormation.positions;
  const usedIds   = new Set();

  squad = positions.map((pos, i) => {
    if (squad[i]) { usedIds.add(squad[i].mapValue.fields.id?.stringValue); return squad[i]; }
    // Find best available player for this position (main or alt)
    const best = allPlayers.find(p => {
      const f   = p.mapValue.fields;
      const id  = f.id?.stringValue;
      if (usedIds.has(id)) return false;
      const mainPos = (f.position?.stringValue || '').toUpperCase();
      const altPos  = (f.altPositions?.stringValue || '').toUpperCase().split(',').map(s=>s.trim());
      return mainPos === pos || altPos.includes(pos);
    });
    if (best) {
      usedIds.add(best.mapValue.fields.id?.stringValue);
      return best;
    }
    // Fallback: any unfilled slot — best available regardless of position
    const fallback = allPlayers.find(p => !usedIds.has(p.mapValue.fields.id?.stringValue));
    if (fallback) { usedIds.add(fallback.mapValue.fields.id?.stringValue); return fallback; }
    return null;
  });

  refreshAllSlots();
  updateStats();
  clearActiveSlot();
  renderPlayerList();
});

// ── Init ───────────────────────────────────────────────────
async function init() {
  await Promise.all([loadFormations(), loadCardDesigns()]);
  loadPlayers(); // non-blocking: update list as it streams in
}

init();
</script>
